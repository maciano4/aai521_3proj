name: Deploy Minimal GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false  # Don't pull LFS files
          
      - name: Create minimal build directory
        run: |
          mkdir -p _site
          
          # Copy index.html from root
          echo "Copying index.html..."
          cp index.html _site/
          
          # Copy images folder if it exists
          if [ -d "images" ]; then
            echo "Copying images folder..."
            cp -r images _site/
            echo "images folder copied"
          else
            echo "images folder not found, skipping"
          fi
          
          echo ""
          echo "Build complete!"
          echo ""
          echo "Build directory size:"
          du -sh _site
          echo ""
          echo "Contents:"
          ls -lh _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
